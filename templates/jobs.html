<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Jobs - Job Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f6fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .navbar h1 { font-size: 2rem; }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-top: 10px;
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
        }
        .navbar a:hover { background: rgba(255,255,255,0.4); }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .filters {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .filters form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .filters input, .filters select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            flex: 1;
            min-width: 150px;
        }
        .filters button {
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .job-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .job-card:hover { transform: translateY(-5px); }
        .job-card h3 { color: #333; margin-bottom: 10px; }
        .job-card .meta { color: #666; font-size: 0.9rem; margin: 5px 0; }
        .job-card .salary { color: #667eea; font-weight: bold; }
        .btn {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 10px;
        }
        .no-jobs { text-align: center; padding: 60px; color: #999; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📋 All Jobs</h1>
        <a href="/">← Back to Home</a>
    </div>

    <div class="container">
        <div class="filters">
            <form method="GET" action="/jobs">
                <input type="text" name="location" placeholder="📍 Location (e.g., Remote)" value="{{ location or '' }}">
                <select name="category">
                    <option value="">All Categories</option>
                    <option value="Engineering" {% if category == "Engineering" %}selected{% endif %}>Engineering</option>
                    <option value="Data" {% if category == "Data" %}selected{% endif %}>Data</option>
                    <option value="Design" {% if category == "Design" %}selected{% endif %}>Design</option>
                    <option value="Marketing" {% if category == "Marketing" %}selected{% endif %}>Marketing</option>
                </select>
                <button type="submit">🔍 Filter</button>
            </form>
        </div>

        <div class="jobs-grid">
            {% if jobs %}
                {% for job in jobs %}
                <div class="job-card">
                    <h3>{{ job.title }}</h3>
                    <div class="meta">📍 {{ job.location }} | 🏷️ {{ job.category }}</div>
                    <div class="salary">💰 {{ job.salary }}</div>
                    <p style="color: #666; margin: 10px 0;">{{ job.description[:100] }}...</p>
                    <a href="/job/{{ job.id }}" class="btn">View Details</a>
                </div>
                {% endfor %}
            {% else %}
                <div class="no-jobs">😕 No jobs found matching your criteria.</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
