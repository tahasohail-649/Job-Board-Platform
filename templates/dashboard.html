<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Job Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f6fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .navbar h1 { font-size: 2rem; }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-top: 10px;
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .stat-card h2 { font-size: 3rem; color: #667eea; }
        .stat-card p { color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📊 Dashboard</h1>
        <a href="/">← Back to Home</a>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h2>{{ total_jobs }}</h2>
                <p>Total Jobs Posted</p>
            </div>
            <div class="stat-card">
                <h2>{{ total_apps }}</h2>
                <p>Total Applications</p>
            </div>
            <div class="stat-card">
                <h2>{{ pending_apps }}</h2>
                <p>Pending Applications</p>
            </div>
            <div class="stat-card">
                <h2>{{ shortlisted_apps }}</h2>
                <p>Shortlisted Candidates</p>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/post_job" style="display: inline-block; padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; border-radius: 30px;">➕ Post a New Job</a>
            <a href="/applications" style="display: inline-block; padding: 12px 30px; background: #28a745; color: white; text-decoration: none; border-radius: 30px; margin-left: 10px;">📄 View All Applications</a>
        </div>
    </div>
</body>
</html>
