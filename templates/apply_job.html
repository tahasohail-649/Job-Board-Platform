<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for {{ job.title }} - Job Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f6fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .navbar h1 { font-size: 2rem; }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-top: 10px;
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .form-card h2 { margin-bottom: 10px; }
        .form-card .subtitle { color: #666; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .form-group textarea { height: 100px; }
        .form-group input[type="file"] { border: none; padding: 0; }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .submit-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📝 Apply for {{ job.title }}</h1>
        <a href="/job/{{ job.id }}">← Back to Job</a>
    </div>

    <div class="container">
        <div class="form-card">
            <h2>📄 Application Form</h2>
            <div class="subtitle">Applying for: <strong>{{ job.title }}</strong> at {{ job.employer.company_name }}</div>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Upload Resume (PDF/DOC)</label>
                    <input type="file" name="resume" accept=".pdf,.doc,.docx" required>
                </div>
                <div class="form-group">
                    <label>Cover Letter</label>
                    <textarea name="cover_letter" placeholder="Why are you a good fit for this role?"></textarea>
                </div>
                <button type="submit" class="submit-btn">✅ Submit Application</button>
            </form>
        </div>
    </div>
</body>
</html>
